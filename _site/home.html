 với a Tuấn. \n3. KH yêu cầu: CN nhất quyết phải đổi a Lâm này đi, KH ko muốn làm việc với cả Lâm thêm 1 chút nào nữa, yêu cầu a Lâm đừng đến nhà KH. Và giải quyết vấn đề triển khai lắp đặt và sự cố kia.","1. KH đã báo cn: A Tú\n2. KH phản ánh: Trong quá trình lắp đặt bỏ sót rất nhiều vít trên tôn, KH mới sử dụng được 10 ngày và giờ dẫn đến tình trạng mưa nước dột xuống rất nhiều đến bàn bi a nhà KH. Trước đó KH cũng đã dặn đội thi công là làm phải để ý để bàn bi a ko bị dột nước.\n3. KH yêu cầu: Giải quyết tình hình này cho KH, và cho 1 lời giải thích đền bù thiệt hại và đưa hướng xử lý như thế nào.","1. KH đã báo Cn\n2.Pin lưu trữu không hiện trên app AIO\n3. yêu cầu CN liên hệ KH gấp","kt ko  liên hệ với kh","KH yêu cầu phản hồi về thông tin thiết bị mang đi bảo hành và trả lại thiết bị cho KH.","1. KH đã báo cn\n2. KH phản ánh: Trên app theo dõi hiệu suất nlmt KH đang thấy ko hiển thị thông số.\n3. KH yêu cầu: Qua kiểm tra hỗ trợ khắc phục tình trạng này","kh chưa báo chi nhánh\nHệ thống nlmt chưa đạt đủ công suất pin lưu trữ chưa đạt sẳn lượng\nyêu cầu kt qua ktra","1. KH chưa báo cn\n2. KH phản ánh: mặt cảm ứng ivt đang bị lỗi ko vào cài đặt được, trên app theo dõi cũng ko thấy có công suất lưới và chỉ hiện mỗi thông số nguồn ắc quy.\n3. KH yêu cầu: Qua kiểm tra khắc phục tình trạng này cho KH.","CN 0971759579 báo sự cố hộ KH\n1.\tKh phản ánh: KH đang nghi dây dc bị hỏng làm ảnh hưởng tới hiệu suất và cũng thấy hiệu suất giảm.\n2.\tKH yêu cầu: kiểm tra gấp và khắc phục tình trạng này cho KH","CN 0974556234 báo sự cố hộ KH 0907334995\n1. KH phản ánh: : Ivt hỏng mấy tuần nay\n2. KH yêu cầu: Qua kiểm tra hỗ trợ, khắc phục tình trạng này","1. KH đã báo cn (KH ko nhớ tên)\n2. KH phản ánh:  đo đạc sai, ko chi tiết và phát sinh thêm vấn đề khiến cho hệ nlmt bị thò sang nhà hàng xóm và nước mưa rơi xuống nhà họ. KH đã báo CN và đưa ra 2 phương án: 1 là lắp nghiêng về nhà KH, 2 là lắp thêm cái máng. KH đã trao đổi với CN được 3 tháng rồi và phương án 1 thì CN bảo khó thực hiện, và thống nhất phương án t2 nhưng giờ vẫn chưa nhận được phản hồi.\n3. KH yêu cầu: Phản hồi lại thông tin này cho KH vào ngày hôm nay vì vấn đề này liên quan đến bảo hành các thứ sau này. Nếu ko thì KH trả lại hàng và lắp bên khác.","1. KH đã báo cn\n2. KH phản ánh: KH chưa tìm hiểu kỹ khi lắp đặt nlmt và phía bên tư vấn cũng chưa đến khảo sát, trao đổi trực tiếp với KH. Giờ KH xem lại tình hình là cảm thấy không phù hợp do KH còn có con nhỏ dưới 1t. KH cũng đã cọc 8tr với phía bên CN.\n3. KH yêu cầu: KH chấm dứt HĐ và mong muốn hoàn lại số tiền cọc.","1. KH chưa báo cn\n2. KH phản ánh: Ko kết nối được vào app để theo dõi hiệu suất nlmt.\n3. KH yêu cầu: Qua kiểm tra hỗ trợ cho KH kết nối lại app theo dõi hiệu suất","1.KH đã liên hệ với CN và đc phản hồi chưa có hàng\n2. KH đã ký thêm phụ lục để lắp đặt thêm Pin 16KWP từ ngày 08 và đã chuyển tiền một phần giá trị hợp đồng, tuy nhiên CN chưa hỗ trợ lắp đặt cho KH do thiếu vật tư thiết bị, App AIO của KH đã có thông tin HĐ và Phụ lục\n3. KH cần CN hỗ trợ lắp đặt sớm cho KH do thời gian đã lâu, liên hệ CN chưa có ngày lắp đặt cụ thể","-Kh báo chi nhánh: Anh hoàng \n-KH phản ánh:  Hệ thống nlmt bị cúp điện lúc 3h chiều\n- KH yêu cầu: Xử lý nhanh giúp anh","KH cần mẫu bổ sung số 01 để báo với điện lực gia đình đang sử dụng NLMT theo nghị định 13 \nYêu cầu KT liên hệ lại KH gấp","\"1. KH đã nhắn tin cho nhân viên tư vấn tại chi nhánh, CN chưa hẹn lịch đến thực hiện cho KH\n\n2. Hệ thống NLMT của KH còn thiếu Catset DC và công đoạn đo điện trở nối đất về đúng giá trị trong hợp đồng chưa có\n\n3. KH cần hoàn thiện đủ các nội dung nêu trên để có thể quyết toán HĐ, cần KT tại CN hỗ trợ gấp\"","1. KH chưa báo cn\n2. KH phản ánh : Hệ 100kw và giờ chạy được chỉ hơn nửa công suất, chỉ có được 53kw đổ về. Trong khi nắng gắt ở Hà Tĩnh, trước lúc mới lắp đặt cũng phải 80 90kW. Sự cố từ trước kiểm tra thiết bị vẫn bình thường mà giờ sản lượng thấy ko đạt.\n3. KH yêu cầu: Qua kiểm tra, khống chế sản lượng, cho dải chạy ổn định cho KH.","1. KH đã liên hệ với NV tại CN tuy nhiên NV KNM\n2. KH thông tin CN đã hẹn đến thi công lắp đặt HT NLMT cho KH từ ngày 21, sau đó hẹn ngày 22 nhưng không có thông tin, KH đã liên hệ CN nhiều lần nhưng KTC, KH đã ký HĐ và đặt cọc để lắp đặt hệ thống NLMT, KH KHL và p/á nếu không lắp đặt được, KH có thể hủy HĐ và yêu cầu hoàn tiền\n\n3. KH cần CN phản hồi sớm và hỗ trợ lắp đặt cho KH","1. KH đã liên hệ CN\n\n2. Từ ngày 17/04 App theo dõi NLMT của KH không có dữ liệu hệ thống NLMT, cài lại App vẫn không có dữ liệu HT, hệ thống không mất điện hay sụt điện tuy nhiên không đồng bộ với App\n\n3.KH cần KT hỗ trợ kiểm tra và khắc phục sớm cho KH","1. KH đã báo CN \n2. KH đã báo qua: ntin qua zalo CN Hà Tĩnh \n3. KH phản ánh: Dây từ trên mái tôn xuống chưa vào ống nhựa và đang bị nguồn hở, KH sợ nguy hiểm. Inverter chưa vào khay chưa làm gọn.\n4. KH yêu cầu: Qua kiểm tra, hỗ trợ KH","1. KH đã báo cn: a Lê Văn Phụng\n2. KH phản ánh: Trước khi tư vấn KH muốn hỏi có thực hiện được thời gian đề ra hay ko để ký HĐ nhưng lúc kí hợp đồng xong chờ 4 ngày chưa có triển khai vật tư thi công. KH có yêu cầu chấm dứt HĐ và CN bảo sẽ thông báo lại với phía bên kinh doanh và sẽ phản hồi lại cho KH. Nhưng đến giờ KH vẫn chưa thấy phản hồi.\n3. KH yêu cầu: Phản hồi lại thông tin về số tiền cọc","KH (work@namdd.dev) gửi mail phản ánh các vấn đề: \n1.\tTiền dây dẫn thừa: Đề nghị Viettel Phú Thọ thực hiện việc bồi hoàn lại tiền cho phần dây điện thừa do thi công sai lệch ban đầu.\n2.\tTiêu chuẩn vật tư tủ điện (Dựa trên buổi làm việc ngày 11/04/2026): Hai bên đã thống nhất ghi nhận hiện trạng là chưa xác định được vật tư bên trong tủ điện có đảm bảo đúng danh sách thiết bị và tiêu chuẩn kỹ thuật của công ty hay không. Tôi yêu cầu phía Tập đoàn và VCC cung cấp chi tiết danh sách vật tư và tiêu chuẩn kỹ thuật để gia đình có cơ sở so sánh với chiếc tủ trị giá 6.500.000 VNĐ hiện tại. Yêu cầu làm rõ tính an toàn khi sử dụng dây cáp DC để đấu nối cho phần AC và dây DC 6mm2 đi với MCB 63A. Thời hạn phản hồi: Trước ngày 20/04/2026.\n3.\tXử lý lỗi Inverter (SPD DC): Hệ thống liên tục báo lỗi DC SPD. Theo thông tin mới nhất, hiện DatGroup đang làm việc với hãng GoodWe và sẽ có email phản hồi kết quả xử lý trong vòng 02 ngày tới. Đề nghị phía Viettel bám sát để xử lý dứt điểm cho khách hàng .\n4.\tĐiều chỉnh chính sách bảo hành (Dựa trên buổi làm việc ngày 11/04/2026): Thông tin bảo hành combo biến tần và pin lưu trữ của hãng hiện không khớp với hợp đồng . Phía Chi nhánh Phú Thọ đã hẹn xử lý trong vòng 120 ngày kể từ ngày 11/04/2026. Như vậy, thời hạn cuối cùng để hoàn tất việc điều chỉnh này là ngày 09/08/2026.\n6.\tThao tác điều khiển thiết bị từ xa không báo trước: Giải trình về việc tài khoản viettelsolar.phutho@gmail.com tự ý \"Xóa dữ liệu báo động lỗi hồ quang\" và \"Vô hiệu hóa báo động chống sét\" ngày 12/04/2026 mà không thông báo hay nắm rõ mục đích xóa.","- KH chưa báo chi nhánh \n- Tấm pin nlmt cần hỗ trợ 2 cái. Hôm nọ kt lắp sai tấm pin nên bị đọng nước, phần trên thì đúng phần dưới thì sai. Có 2 cái sửa  thì 1 cái dùng được  1 cái không\n- KH cần hỗ trợ sớm","1. KH đã báo cn: a Hoàng Đình Nhâm\n2. KH phản ánh: KH đã báo cn nhiều lần nhưng chưa được hỗ trợ. Hệ của KH 6 cục pin nhưng chỉ thấy xả 3 cục và chỉ xài được 1 lúc là nó hết.\n3. KH yêu cầu: Điều KT qua kiểm tra, khắc phục tình trạng này cho KH.\n***SĐT phản ánh và liên hệ: 0706455040","1. KH đã báo CN\n2. KH đã báo cho anh Quân GĐ Cn, nhưng anh này luôn kêu bận\n3. KH đang sử dụng NLMT có chia ra 2 đồng hồ sử dụng cho 2 nhà riêng biệt để dùng, , nhưng hiện tại chỉ có 1 đồng hồ đẻ sử dụng\n3. KH YC KT qua kiểm tra và xử lý gấp","Kh báo 1 đh bị kêu và không mát","- Chưa báo cho chi nhánh \n- Lắp điện nlmt trên hệ thống hiển thị sai: hệ thống màn hình từ nhà mà nuôi ra điện ngoài, hướng dẫn tải app để theo dõi điện nlmt","- KH báo qua chị Phượng (CN) \n- KH đang gặp sự cố ắc quy, 2 khối ắc quy 1 khối xả 1 khối không\n- Kh yêu cầu xử lý sớm","- Anh báo cho quản lý cho nhân viên xuống không giải quyết đươc nên mới gọi lên tổng đài  \n- Hỗ trợ  kết nối điện nlmt với app để theo dõi thông số. Trước mạng wifi bị hỏng  nên anh phải cài lại\n- Hỗ trợ nhanh giúp anh.","Trong thời gian vừa qua tôi quan sát thấy inverter hybrid có hiện tượng giảm huy động công suất DC từ tấm pin, dù trời vẫn nắng tốt và ổn định, bình lưu trữ vẫn chưa đầy và vẫn phải rút điện từ bình lưu trữ để cấp điện cho phụ tải AC. Mỗi lần hiện tượng này xảy ra kéo dài khoảng 15 - 30 phút vào thời điểm ngẫu nhiên trong ngày.\nVCC hỗ trợ để tìm ra được nguyên nhân và giải pháp cho vấn đề này.","1. KH chưa báo CN\n2. KH đang sd NLMT nhưng hiện tại thiết bị ko xả điện\n3. YC KT qua kiểm tra và xử lý gấp\n***địa chỉ lắp đặt: kilo 63, khu đô thị đức tài, xã hoài đức, tỉnh lâm đồng.","kh đã báo chi nhánh ( ko nhớ tên người bán)\nBiến tần lỗi và mất kết nối app\nkh yêu cầu kĩ thuật qua xử lý","KH gọi từ số 0384349062 báo Inverter không hoạt động\nYV KT qua kiểm tra và xử lý gấp","1. KH chưa báo CN\n2. KH phản ánh: Khi mất điện và khi mới có điện thì giật giật mất điện rồi lại có 3,4 lần trong khi pin 80% đầy điện.  Và hiện tượng ko an toàn bởi vì nhà sử dụng thang máy,  mà 3 4 lần như thế rất sợ. Thỉnh thoảng, khi mất điện xảy ra tình trạng này, giật giật mấy phát rồi có lưới pin.\n3. KH yêu cầu: Kiểm tra thiết bị, điện ở trong nhà và khắc phục tình trạng này.","- Mới gọi lên tổng đài \n- Anh đã ký hd. Khi nào có thể lắp đặt nlmt cho anh","1. Khách hàng không báo qua chi nhánh \n2. Khách chỉ báo qua hotline \n3. Điện nllmt 2 3 hôm nay hiệu số rất thấp.Giờ cao điểm trước đây thu được 5 6 kí giờ chỉ còn 2 3 kí","Mất 1 string điện không vào ắc quy. Không đủ cung cấp cho tải nhà dùng . Anh cần đến kiêm tra trong ngày hôm nay.\n**Địa chỉ lắp đặt: số nhà 300, kim tân, xã đoài phương, thành phố hà nội.","1. KH đã báo CN: a Nghĩa\n2. KH phản ánh: bị hỏng ắc quy\n3. KH yêu cầu: KT qua kiểm tra hỗ trợ, khắc phục tình trạng này cho KH.\n***SĐT phản ánh và liên hệ: 0964109909","KH dã báo CN\nKH đang sử dụng <script>
(function () {

  var activeKeys = null;

  function initFilter() {
    if (typeof crosstalk === 'undefined') { setTimeout(initFilter, 150); return; }
    var fh = new crosstalk.FilterHandle(CT_GROUP);
    fh.on('change', function (e) {
      activeKeys = (e.value && e.value.length > 0) ? e.value : null;
    });
  }
  initFilter();

  function getFilteredData() {
    if (!activeKeys) return FULL_DATA;
    var keySet = new Set(activeKeys.map(String));
    return FULL_DATA.filter(function (_, i) {
      return keySet.has(String(i + 1));
    });
  }

  function loadScript(url, cb) {
    if (document.querySelector('script[src="' + url + '"]')) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = cb || function () {};
    s.onerror = function () { alert('Không load được: ' + url); };
    document.head.appendChild(s);
  }

  function setBtnState(btn, loading, label) {
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading ? '⏳ Đang tạo...' : label;
  }

  /* ── EXCEL ── */
  window._taiExcel = function (btn) {
    function doExcel() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '⬇ Tải Excel');
        return;
      }
      var ws = XLSX.utils.json_to_sheet(rows, { header: COL_NAMES });
      ws['!cols'] = COL_NAMES.map(function (col) {
        return { wch: Math.max(Math.round((COL_WIDTHS[col] || 100) / 7), 8) };
      });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sach ticket');
      XLSX.writeFile(wb, 'danh_sach_ticket.xlsx');
      setBtnState(btn, false, '⬇ Tải Excel');
    }
    window.XLSX
      ? doExcel()
      : loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js', doExcel);
  };

  /* ── PNG ── */
  window._taiPNG = function (btn) {
    function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();
</script>

    function throttle(fn, ms) {
    let throttle = false;
    let timer;
      return (...args) => {
        if(!throttle) { // first call gets through
            fn.apply(this, args);
            throttle = true;
        } else { // all the others get throttled
            if(timer) clearTimeout(timer); // cancel #2
            timer = setTimeout(() => {
              fn.apply(this, args);
