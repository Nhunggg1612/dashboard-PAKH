òn hệ 8kw nhưng chỉ tối đa được 4-5kw Công suất tối đa chỉ được 1 nửa. Ngoài ra HĐ đã hoàn thiện nghiệm thu KH đã ký và yêu cầu nv là a Hiệp gửi thông báo cho điện lực rồi nhưng điện lực vẫn báo KH chưa nộp.\n3. KH yêu cầu: Qua kiểm tra thiết bị đảm bảo hiệu suất theo đúng cam kết và phản hồi cho KH về việc thông báo điện lực đến đâu rồi.","KH chưa thấy có ai liên hệ tư vấn nlmt","- KH phản ánh : Đã kí hợp đồng và lắp pin mà chờ inveter lâu quá. A đã báo bạn Tài, chi nhánh Tuyên Quang mà bạn ý bảo không có hàng. Khách hàng đã đặt cọc 50%. Với một công ty lớn như Viettel mà trả lời câu nói là không có hàng rất buồn cười. \n- KH yêu cầu hoàn thành lắp đặt inveter  sớm cho anh","- KH báo qua chị Phượng (CN) \n- KH đang gặp sự cố ắc quy, 2 khối ắc quy 1 khối xả 1 khối không\n- Kh yêu cầu xử lý sớm","- KH đã gọi  A Tùng ( chi nhánh)  cháy máy mà không trả lời \n- Gọi qua hotline\n- KH phản ánh:Hợp đồng  nlmt đã kí từ ngày 22/3 mà đến giờ vẫn chưa lắp đặt. Hẹn ngày 5/4 mà vẫn chưa trả lời\n- Khách hàng yêu cầu triển khai sớm cho anh, trời rất nóng","1.KH chưa báo chi nhánh\n2. KH phẩn ánh : từ khi lắp đặt nlmt chi phí sản xuât của công ty giảm không đáng kể, kiểm tra số liệu trên app ít hơn với báo báo thực tế của điên lực \n3 KH yêu cầu KT qua kiểm tra và xử lý gấp","KH có đơn bảo dưỡng từ ngày 12 hiện chưa có KT  liên hệ\nyêu cầu KT liên hệ","đổi bình inveter lưu trữ không cập nhật mục 3 ở hợp đồng","KH có đơn Bảo dưỡng Điều hòa treo tường mới được làm ngày 13.4\nHiện tại lại bị chảy nước\nYC KT qua kiểm tra lại","- Anh báo cho quản lý cho nhân viên xuống không giải quyết đươc nên mới gọi lên tổng đài  \n- Hỗ trợ  kết nối điện nlmt với app để theo dõi thông số. Trước mạng wifi bị hỏng  nên anh phải cài lại\n- Hỗ trợ nhanh giúp anh.","1. KH đã báo cn: KH gọi điện (KH chỉ để là tên là KT viettel, ko lưu tên)\n2. KH phản ánh: Hệ của KH là 8kWp. Năm ngoái sản phẩm vẫn còn là 6kwp/ 1 ngày mà giờ cao nhất chỉ thấy là có 5kwp còn đâu là toàn 4kwp đổ lại.\n3. KH yêu cầu: KT qua     if (typeof crosstalk === 'undefined') { setTimeout(initFilter, 150); return; }
    var fh = new crosstalk.FilterHandle(CT_GROUP);
    fh.on('change', function (e) {
      activeKeys = (e.value && e.value.length > 0) ? e.value : null;
    });
  }
  initFilter();

  function getFilteredData() {
    if (!activeKeys) return FULL_DATA;
    var keySet = new Set(activeKeys.map(String));
    return FULL_DATA.filter(function (_, i) {
      return keySet.has(String(i + 1));
    });
  }

  function loadScript(url, cb) {
    if (document.querySelector('script[src="' + url + '"]')) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = cb || function () {};
    s.onerror = function () { alert('Không load được: ' + url); };
    document.head.appendChild(s);
  }

  function setBtnState(btn, loading, label) {
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading ? '⏳ Đang tạo...' : label;
  }

  /* ── EXCEL ── */
  window._taiExcel = function (btn) {
    function doExcel() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '⬇ Tải Excel');
        return;
      }
      var ws = XLSX.utils.json_to_sheet(rows, { header: COL_NAMES });
      ws['!cols'] = COL_NAMES.map(function (col) {
        return { wch: Math.max(Math.round((COL_WIDTHS[col] || 100) / 7), 8) };
      });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sach ticket');
      XLSX.writeFile(wb, 'danh_sach_ticket.xlsx');
      setBtnState(btn, false, '⬇ Tải Excel');
    }
    window.XLSX
      ? doExcel()
      : loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js', doExcel);
  };

  /* ── PNG ── */
  window._taiPNG = function (btn) {
    function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();
