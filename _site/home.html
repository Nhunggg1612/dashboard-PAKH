ý, có chụp ảnh ivt màn hình hiển thị qua zalo.\n2. KH phản ánh: Điện nlmt bị chập chờ khi cúp điện lưới trên pin lưu trữ hiển thị 80% nhưng điện nlmt đang chạy vẫn bị cúp, sau đó lại có lại, cúp khoảng 10p, rồi lại có lại, tần suất bị liên tục.\n3. KH yêu cầu: KT qua kiểm tra tình trạng và đưa ra phương án xử lý khắc phục tình trạng này cho KH.\nTrước khi qua gọi trước cho anh, anh không có ở nhà","CN 0985814499 báo sự cố hộ KH\n1. KH phản ánh: biến tần kêu to và ko hoạt động 4 ngày hnay. Ngoài ra thi thoảng hệ thống bị mất kết nối với biến tần.\n2. KH yêu cầu: KH sốt ruột cần kiểm tra và xử lý gấp, và kéo dây mạng cắm trực tiếp để kết nối biến tần chứ đang bắt bằng wifi rất yếu.","- Chưa báo cho chi nhánh\n- Hiệu suất hệ thống nlmt kém \n- Xử lý sớm giúp cho anh","KH gọi lên TĐ báo chưa thấy có KT liên hệ tư vấn, khảo sát","1. KH đã báo cn: a Tuy vừa ký HĐ,trực tiếp làm việc với KH\n2. KH phản ánh: Hệ của KH mới chỉ lắp đặt chưa có BBNT. Tối qua là lần đầu bị mất điện lưới vào lúc 10h và 3h áp trong tủ nhảy liên tục, điện trong nhà và các thiết bị điện cũng chập chờn, nhảy liên tục như vậy. KH kiểm tra thấy toàn bộ hệ thống nlmt ko sử dụng được, pin cũng ko thấy xả.\n3. KH yêu cầu: Qua kiểm tra thiết bị, khắc phục tình trạng này và đảm bảo an toàn cho KH.","1. KH đã báo CN: đã báo anh Mạnh+ anh Hoàng\n2.KH phản ánh: KH nghi ngờ KT đấu nhầm điện cục nóng và cục lạnh, dẫn đến KH tắt điện vẫn sáng,  \n3.YC KT qua kiểm tra và xử lý gấp","1. KH chưa báo CN\n2.KH phản ánh: Hệ thống nlmt nhà KH cứ vào sáng sớm và lúc hết PIN là dịch vụ bị ngắt\n3. YC KT qua kiểm tra và xử lý gấp","KH thay máy mới nên cần hỗ trợ cài đặt lại app và hướng dẫn theo dõi hiệu suất nlmt.\n***SĐT phản ánh và liên hệ: 0987056905","1. KH đã báo cn\n2. KH phản ánh: pin nlmt ko vào điện và báo đỏ mấy ngày hnay\n3. KH yêu cầu: KT qua kiểm tra, khắc phục tình trạng này","1. KH đã báo cn: a Hiệp bên kinh doanh\n2. KH phản ánh: HĐ Hệ 16.25kW chia ra làm 2 chỗ, hiệu suất ko đạt theo cam kết, trên nhà là h     function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();

        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();
