 chỉ được 3 kw thì chạy nổi, bật thêm 1 bơm bên 5kw rưỡi nữa thì tự nhảy đèn đỏ, ko chạy được, chỉ lưới điện không. Sự cố bị hòai, KT trao đổi với nhau qua điện thoại bảo KH xem có bị quá tải không, do nguồn điện đầu vào yếu quá, KH thấy ít nhất cũng phải đến ktra trực tiếp.\n3. KH yêu cầu: Có KT qua kiểm tra trực tiếp, xác định nguyên nhà và đưa ra phương án xử lý, khắc phục cho KH.","1. KH đã báo cn: a trường, a chạm, a Trung\n2. KH phản ánh: hàng chưa về, cn có hẹn m4 là bàn giao toàn bộ linh kiện để lắp đặt nhưng CN có phản hồi lý do là hàng từ hà nội chưa về được. KH đã thanh toán số tiền trong HĐ.\n3. KH yêu cầu: Phản hồi và tình trạng linh kiện đang di chuyển đến đâu rồi và chậm nhất là đến m10 phải có linh kiện, vật tư ở đây nếu ko KH sẽ chấm dứt HĐ.","- Đã báo chi nhánh, cn báo gọi lên tổng đài \n- Hướng dẫn a cách xem app cài đặt mới AIO, cho người qua kiểm tra cho anh apptomat bị nhảy . Báo KT kiểm tra nhanh giúp anh","1. CN báo hộ: SDT báo 0985787899\n2.KH đang dùng NLMT nhưng hiện tại bình sạc ko thể sạc đầy được\n3.YC KT kiểm tra và khắc phục cho KH\n4. YC giao cho NV: 449301 xly","Mất 1 string điện không vào ắc quy. Không đủ cung cấp cho tải nhà dùng . Anh cần đến kiêm tra trong ngày hôm nay.\n**Địa chỉ lắp đặt: số nhà 300, kim tân, xã đoài phương, thành phố hà nội.","Báo lên tổng  đài .sự cố nlmt hiệu suất bán tải  không còn cao như trước , 5 kí còn 2 kí 2  kiểm tra lại cho anh","1. KH chưa báo cn\n2. KH phản ánh: hệ thống nlmt ở trạng thái báo động, ko ghi nhận dữ liệu, ko thấy số đầu ra.\n3. KH yêu cầu: KT qua kiểm tra thiết bị, khắc phục tình trạng này.","1. KH phản ánh: Vào app theo dõi thì nó bắt cài đặt tạo nhà máy trạm là như nào. Vẫn còn tên trên app\n2. KH yêu cầu: KT hỗ trợ giúp KH.","KH phản ánh: Nhà bị cháy, cháy 3 tấm pin năng lượng.\nKH yêu cầu: cần kỹ thuật hỗ trợ kiểm tra giúp hệ thống.","- Đã liên hệ chi nhánh \n- kí hợp đồng bên viettel nghệ an từ ngày 25/3,  trong hợp đồng kí 7- 10 ngày các bạn phải đưa thiết bị  cho chị, mà giờ quá thời gian vẫn chưa thấy  . Chi nhánh ở nghệ an báo là không có hàng, phải đợi từ ngoài hà nội. Thông báo chính xác lại cho chị khi nào mới có hàng để chị sắp xếp người ở nhà. Trong thời gian chị chờ các em tốn rất nhiều tiền điện","1. KH đã báo cn: a Phan Hải Sơn\n2. KH phản ánh: Ko kết nối được app để theo dõi hiệu suất nlmt\n3. KH yêu cầu: Qua hỗ trợ kiểm tra cho KH","1. Khách hàng chưa báo chi nhánh \n2. Đã báo qua hotline \n3.Đã kí hợp đồng nlmt, mà không có thợ làm, lắp đặt . Anh kí từ ngày 29/3 .Trong 1 tuần là lắp đặt xong, mà 10 ngày vẫn chưa lắp","Đơn hàng làm vào 6/3 mà KH chưa thấy có ai liên hệ.","1. KH đã báo cn: Anh Phụng\n2. KH phản ánh: Chưa thấy có vật tư để lắp đặt nlmt, hơn 1 tháng trời rồi, sân với mái dọn đi rồi mà để mưa gió như thế. HĐ ký lại do chuyển cty, nên đã hơn 1 tháng trời.\n3. KH yêu cầu: liên hệ phản hồi lý do vật tư chậm trễ, và triển khai lắp đặt nlmt cho KH. Nếu ko phản hồi KH sẽ chấm dứt HĐ.","Hôm nay mất điện không tự chuyển  sang điện mặt trời, bị mất điện nhà luôn. Anh không vào app giám sát theo dõi sản lượng được. kiểm tra lại cho anh","Chưa báo qua chi nhánh \nLăp điện nlmt 80kg pin 100KW, trời  nắng lớn hiệu suất không đủ. Thợ đến kiểm tra báo pin không nạp đủ . Có một số tấm pin không được liên kết vào. Đến kiểm tra lại cho anh","1. KH đã báo CN: a Nghĩa\n2. KH phản ánh: bị hỏng ắc quy\n3. KH yêu cầu: KT qua kiểm tra hỗ trợ, khắc phục tình trạng này cho KH.\n***SĐT phản ánh và liên hệ: 0964109909","1. KH đã báo cn: a Học, a Quyết\n2. KH phản ánh: công suất 50kw nhưng nhiều lúc còn chưa lên được 30kw, toàn phải dùng điện lưới.\n3. KH yêu cầu: Qua kiểm tra và mở hết công suất, và xem có chạy song song vừa điện lưới vừa nlmt được không, KH muốn lắp thêm hệ, và xem cần vệ sinh tấm pin nlmt nữa.","Sản phẩm KH được tặng, KH nội bộ viettel. Người phản ánh báo hộ 0966337575 \n1. KH phản ánh: Bếp từ đang bị lỗi không sử dụng được\n2. KH yêu cầu: Bảo hành bếp từ này cho KH\n***SĐT phản ánh: 0966337575 và zalo Đình Đại","1. KH đã báo CN: KT trước lắp đặt nhưng nghỉ việc\n2. KH phản ánh: Có trao đổi với KT là bị nhảy áp và KT bảo bật cầu dao nếu ko được thì gọi lên TĐ. Bình sạc 100% có sử dụng có mỗi máy lạnh thôi mà nó nhảy\n3. KH yêu cầu: kiểm tra ats, giờ ko chuyển đổi được, ko xài được điện lưới.","1. KH đã báo cn: a Hà Hữu Giang\n2. KH phản ánh: Sự cố hiệu suất từ trước KT đã đến kiểm tra và trao đổi với KH đưa ra kết luận là do bên Kinh Doanh tư vấn lắp đặt sai nên tấm pin bị che khuất, che phủ nên ko đạt hiệu suất. Từ đầu lúc ký HĐ, KH đã trao đổi với a Tín là nên lắp hướng nào, hay nắng hướng nào và vị trí này tối đa hiệu suất là bnhieu. Hệ của KH là 36kw, bên kinh  doanh có cam kết là trung bình 1 ngày 100 số, và 6 tháng đầu sử dụng là từ 2900-3100 số mà giờ chỉ được 60-70 số 1 ngày, sản lượng ko đạt.\n3. KH yêu cầu: Có trách nhiệm cam kết đúng giữa KH và bên Kinh doanh, và thực hiện đưa ra phương án xử lý để có sản lượng theo đúng cam kết. KH yêu cầu xử lý gấp.","1. KH chưa báo CN\n2. KH phản ánh: Vẫn bị nhảy áp ắc quy, cứ 2,3 hôm là 1 lần bị. Có khởi động lại và dùng được 3 hôm lại sập.\n3. KH yêu cầu: Kiểm tra lại và khắc phục dứt điểm cho KH.","Đã kí hợp đồng. Đã làm việc với chi nhánh, chi nhánh báo t7 sẽ làm việc. Anh gọi lên thì nv báo e sẽ gọi anh luôn. Mà lúc anh gọi lại thì  tắt máy. Ít nhất phải cho anh 1 cái hẹn","1. Kh đã báo với các bạn nhân viên bên chi nhánh, báo 5 6 lần cả tháng nay mà không thấy ai xuống \n2. Cứ mỗi lần cấp điện lưới, lại bị nhảy biến tần bộp bộp bộp","1. KH đã báo cn: đã có sự cố từ trước\n2. KH phản ánh: Vẫn bị lỗi bị nhảy át liên tục, trục trặc và đến giờ không sử dụng được.\n3. KH yêu cầu: qua kiểm tra, khắc phục dứt điểm tình trạng này.","1. KH đã báo cn,KT có xuống ktra nhưng chưa tìm được nguyên nhân bảo TĐ gọi KT xuống ktra\n2. KH phản ánh: Chập aptomat, pin tụt xuống 20% là nhảy áp thường xuyên xảy ra bên đêm\n3. KH yêu cầu: KT xuống kiểm tra nguyên nhân và khắc phục tình trạng này cho KH.","1. KH đã báo cn 1 tuần\n2. KH yêu cầu thanh lý HĐ bởi vì giá cao quá, KH muốn lấy lại tiền, và giải quyết nhanh.\n***SĐT phản ánh: 0965982906","KH dã báo CN\nKH đang sử dụng NLMT, hiện tại KH ko thấy phát sinh điện, bên điện lực báo ko thấy công tơ lên\nYC KT qua kiểm tra và xử lý cho KH","KH đã báo CN\nKH dang sd NLMT Hiện tại thiết bị ko hoạt động\ntiền điện tăng ,thấy biến tần báo lỗi\nKH yc KT qua kiểm tra và xử lý","1. KH đã báo cn: CN qua kiểm tra qua loa, đổ thừa này nọ\n2. KH phản ánh: Hệ của KH 10kw cũng chỉ thấy chạy được 5,6 kw điện. KH có lắp thêm 5 tấm nữa chạy cho mạnh cũng chỉ lên được 7 kw mà nắng gắt 35 độ. KH ktra thấy biến tần chạy khoảng 60%.\n3. KH yêu cầu: Qua kiểm tra tình trạng nguyên nhân để tăng hiệu suất đúng với hệ của KH.","1. KH đã báo CN sự cố từ trước giờ gặp lại tình trạng cũ\n2. KH phản ánh: KHDN có 2 hệ thì 1 hệ đang bị lỗi, CN đã 1 lần lên sửa nhưng vẫn bị lỗi.\n3. KH yêu cầu: Kiểm tra nguyên nhân và khắc phục dứt điểm cho KH.","hệ thống nlmt bị lỗi, viên pin bị lủng. Kĩ thuật báo theo dõi. Điện bị sụt","1. KH đã báo CN\n2. KH phản ánh: Ivt bị lỗi ko lên màn hình, ko xả và nạp được\n3. KH yêu cầu: Kiểm tra và khắc phục tình trạng này cho KH\n**Ghi chú: - CN làm sai SĐT trong HĐ: SĐT đúng là 0975020758 \n- SĐT liên hệ và phản ánh: 0962608008 chồng của KH","1. KH chưa báo cn\n2. KH phản ánh: nhà KH có thêm ats của máy nổ, về nguyên tắc máy điện phải chạy nlmt, khi nlmt hết thì chạy máy nổ. Hiện tại thì khi mất điện ko chạy sang nlmt, và khi nlmt hết rồi vẫn ko thấy chạy máy nổ. \n3. KH yêu cầu: Kiểm tra trước nội dung về ats của máy nổ và nlmt. Và khắc phục tình trạng ko sử dụng này của KH.","ATS chuyển nguồn thiết bị hỏng.\nKH đã được hỗ trợ.","1. KH đã báo cn\n2. KH yêu cầu: Muốn hiện thông số trên app từ ivt qua điện lưới với điện dùng cho GĐ để báo điện lực.","1. KH đã báo giám đốc chi nhánh nhưng chưa được xử lý dứt điểm\n2. KH phản ánh NLMT bị hỏng không sử dụng được\n3. KH yêu cầu kỹ thuật qua hỗ trợ thay aptomat to hơn","Lỗi pin ko lưu","KH chưa báo CN\nKH đang sử dụng tấm <script>
(function () {

  var activeKeys = null;

  function initFilter() {
    if (typeof crosstalk === 'undefined') { setTimeout(initFilter, 150); return; }
    var fh = new crosstalk.FilterHandle(CT_GROUP);
    fh.on('change', function (e) {
      activeKeys = (e.value && e.value.length > 0) ? e.value : null;
    });
  }
  initFilter();

  function getFilteredData() {
    if (!activeKeys) return FULL_DATA;
    var keySet = new Set(activeKeys.map(String));
    return FULL_DATA.filter(function (_, i) {
      return keySet.has(String(i + 1));
    });
  }

  function loadScript(url, cb) {
    if (document.querySelector('script[src="' + url + '"]')) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = cb || function () {};
    s.onerror = function () { alert('Không load được: ' + url); };
    document.head.appendChild(s);
  }

  function setBtnState(btn, loading, label) {
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading ? '⏳ Đang tạo...' : label;
  }

  /* ── EXCEL ── */
  window._taiExcel = function (btn) {
    function doExcel() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '⬇ Tải Excel');
        return;
      }
      var ws = XLSX.utils.json_to_sheet(rows, { header: COL_NAMES });
      ws['!cols'] = COL_NAMES.map(function (col) {
        return { wch: Math.max(Math.round((COL_WIDTHS[col] || 100) / 7), 8) };
      });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sach ticket');
      XLSX.writeFile(wb, 'danh_sach_ticket.xlsx');
      setBtnState(btn, false, '⬇ Tải Excel');
    }
    window.XLSX
      ? doExcel()
      : loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js', doExcel);
  };

  /* ── PNG ── */
  window._taiPNG = function (btn) {
    function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();
</script>
