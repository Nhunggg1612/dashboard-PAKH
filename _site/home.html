nay \n- KH yêu cầu: Xử lý sớm cho anh","- Kh chưa báo chi nhánh\n- Kh phản ánh:Đã đặt cọc tiền nlmt mà đến giờ vẫn chưa lăp đặt xong.5h chiều hôm qua hẹn hôm nay đến mà không thấy đến.Giao vật tư không báo sớm toàn báo sát giờ.Cách làm việc không đạt. Đã kí hợp đồng nhưng chưa lắp đặt nlmt mới tập kết vật tư \n- Kh yêu cầu: Lắp đặt sớm cho khách","Chi nhánh báo hộ sdt( 0343465634)\nInveter lỗi 2 string lệch nhau về điện áp \nYeu cau kt xuong ktra cho kh","1. KH đã báo CN: A Hoàng\n2. KH phản ánh: CN là a Hoàng hứa hẹn là trong vòng 5 ngày sau khi đặt cọc ký HĐ sẽ lắp đặt NLMT cho KH mà giờ vẫn ko thấy đâu rồi cứ hẹn mãi hẹn mãi không biết đến khi nào. Và giờ khiến KH cứ phải đợi chờ suốt 5 ngày nay, KH rất bức xúc về cách làm việc của CN.\n3. KH yêu cầu: Sau khi đọc lại điều khoản về thời gian lắp đặt là 15 ngày, nếu chính xác 15 ngày chưa triển khai lắp đặt cho KH, KH yêu cầu là hủy HĐ và hoàn lại số tiền cọc.","- Kh đã gọi qua chi nhánh( A Hậu) mà không nghe máy \n- Kh phản ánh: Điện nlmt bị cúp điện. Trong khi đó trời nắng rất to, bình lưu trữ còn 4 5 nấc mà vẫn bị mất điện. \n- Kh yêu cầu: Xử lý sớm cho khách","- KH đã báo chi nhánh: A Thêm \n-KH phản ánh: Pin nlmt không nạp xuống điện lưới \n- Kh yêu cầu: Sớm xử lý lại cho khách","- KH báo qua cn: Chị Dừa \n- KH yêu cầu: Đi lại một số dây tiếp điện cắm pin. Chưa tiếp silicon  ở phần khoan rút lõi. Tiếp điạ  từ tấm pin xuống biến tần. Cái cài C4 cần hất sang 1 bên để tránh nước rơi xuống điểm giao tiếp của 2 MC.","máy giặt bị kêu trước khi Kt qua thì vẫn kêu, KH yêu cầu KT qua kiểm tra lại\nYEu cầu CN liên hệ cho KH gấp","Đã báo chi nhánh \nkí hợp đồng từ 13/4 không đến lắp cho kh\nyêu cầu kt qua lắp cho khách","Chi nhánh báo hộ kh ( 0977385976)\nLỗi ktra lại nlmt đẩy lưới nhiều do ngược pha kiểm tra lại triều ct cho khách hàng\nYêu cầu kt qua xửu lý cho kh","1. KH chưa báo CN\n\n2. HT NLMT hiệu suất thấp, HT 15KWP tuy nhiên hiệu suất hiện tại chưa được 7KWP ( 3 Tháng liên tục)\n\n3. KH cần KT đến hỗ trợ kiểm tra và xử lý giúp","Khách  hàng chưa báo chi nhánh  \nPin năng lượng mặt trời sản lượng ra không kh đã theo dõi tren app ( hiệu suất không đạt ) \nYêu cầu kĩ thuật qua xử lý cho khách hàng","Chi nhánh báo hooj kh ( 0365515300 )\nLỗi Pin lưu trữ  ko lên bình sập nguồn\nYêu  cầu kt qua xử lỹ cho kh","- Đã báo qua chi nhánh: A Hoàng\n- Kh phản ánh: Trên app không hiển thị hiệu suất nlmt,tấm pin, biến tần,...\n- Kh yêu cầu: Xử lý nhanh cho khách","đã báo chi nhánh\nKhông theo dõi được hiệu suất qua app\nyêu cầu kt qua hỗ trợ","Chưa báo chi nhánh \nKh nlmt bị biết tần bị nhẩy và tấm pin bị nứt \nYêu cầu chi nhánh qua hỗ trợ","1. KH đã báo CN (KH ko nhớ rõ tên)\n2. KH phản ánh: Cách đây 4 hôm hệ của KH bị sét đánh, KH cũng ko rõ là ở đâu chỉ thấy áp ở tủ điện nhảy xuống, điện ko phát lên lưới và thấy bị hỏng.\n3. KH yêu cầu: KT qua kiểm tra, khắc phục tình trạng này cho KH.","1. KH đã báo cn: a Hà Hữu Giang\n2. KH phản ánh: Sự cố hiệu suất từ trước KT đã đến kiểm tra và trao đổi với KH đưa ra kết luận là do bên Kinh Doanh tư vấn lắp đặt sai nên tấm pin bị che khuất, che phủ nên ko đạt hiệu suất. Từ đầu lúc ký HĐ, KH đã trao đổi với a Tín là nên lắp hướng nào, hay nắng hướng nào và vị trí này tối đa hiệu suất là bnhieu. Hệ của KH là 36kw, bên kinh  doanh có cam kết là trung bình 1 ngày 100 số, và 6 tháng đầu sử dụng là từ 2900-3100 số mà giờ chỉ được 60-70 số 1 ngày, sản lượng ko đạt.\n3. KH yêu cầu: Có trách nhiệm cam kết đúng giữa KH và bên Kinh doanh, và thực hiện đưa ra phương án xử lý để có sản lượng theo đúng cam kết. KH yêu cầu xử lý gấp.","Đã báo chi nhánh  bình long tỉnh đồng nai\nSự cố bát sạc không vào \nYêu cầu kt qua xửu lý cho kh","1. KH đã báo cn\n2. KH phản ánh: Bị mất kết nối app để theo dõi hiệu suất NLMT\n3. KH yêu cầu: Hỗ trợ KH kết nối lại app để xem hiệu suất","1. KH chưa liên hệ với CN ( do thay đổi nhân sự nên chưa biết liên hệ ai)\n2. HT NLMT, điện nạp vào Ắc quy kém so với bình thường\n3. KH cần KT đến hỗ trợ kiểm tra và xử lý sớm","Đã báo chi nhánh( ko nhớ tên )\nKh bảo mỗi NLMT hỏng ,\nyêu cầu kt qua ktra","kh gọi chi nhánh nhưng không ai phản hồi lại\nkh yêu cầu kt gọi lại cho kh để báo đúng ngày lắp đặt","1. KH chưa báo cn\n2. KH phản ánh: Ivt có vấn đề báo đỏ\n3. KH yêu cầu: Qua kiểm tra khắc phục","1. Khách hàng cần hỗ trợ cài lại app monitor do đã đổi điện thoại mới\n\n2. Địa chỉ :-địa chỉ mới : Tổ 8, Ấp Phước An, Xã Cầu Khởi, Tây Ninh\n              -địa chỉ cũ :Tổ 8, Ấp Phước An, xã Phước Ninh, Huyện Dương Minh Châu, Tỉnh Tây Ninh\n\n3. KH cần hỗ trợ sớm để có thể sử dụng","Chưa báo chi nhánh\nLỗi cảnh báo ác quy hiệu suất ko đạt \nYêu cầu kt qua ktra","kh chưa báo chi nhánh\nHệ thống nlmt chưa đạt đủ công suất pin lưu trữ chưa đạt sẳn lượng\nyêu cầu kt qua ktra","CN 0971759579 báo sự cố hộ KH\n1.\tKh phản ánh: KH đang nghi dây dc bị hỏng làm ảnh hưởng tới hiệu suất và cũng thấy hiệu suất giảm.\n2.\tKH yêu cầu: kiểm tra gấp và khắc phục tình trạng này cho KH","KH cần mẫu bổ sung số 01 để báo với điện lực gia đình đang sử dụng NLMT theo nghị định 13 \nYêu cầu KT liên hệ lại KH gấp","1. KH chưa báo cn\n2. KH phản ánh : Hệ 100kw và giờ chạy được chỉ hơn nửa công suất, chỉ có được 53kw đổ về. Trong khi nắng gắt ở Hà Tĩnh, trước lúc mới lắp đặt cũng phải 80 90kW. Sự cố từ trước kiểm tra thiết bị vẫn bình thường mà giờ sản lượng thấy ko đạt.\n3. KH yêu cầu: Qua kiểm tra, khống chế sản lượng, cho dải chạy ổn định cho KH.","1. KH đã liên hệ với NV tại CN tuy nhiên NV KNM\n2. KH thông tin CN đã hẹn đến thi công lắp đặt HT NLMT cho KH từ ngày 21, sau đó hẹn ngày 22 nhưng không có thông tin, KH đã liên hệ CN nhiều lần nhưng KTC, KH đã ký HĐ và đặt cọc để lắp đặt hệ thống NLMT, KH KHL và p/á nếu không lắp đặt được, KH có thể hủy HĐ và yêu cầu hoàn tiền\n\n3. KH cần CN phản hồi sớm và hỗ trợ lắp đặt cho KH","1. KH đã báo CN \n2. KH đã báo qua: ntin qua zalo CN Hà Tĩnh \n3. KH phản ánh: Dây từ trên mái tôn xuống chưa vào ống nhựa và đang bị nguồn hở, KH sợ nguy hiểm. Inverter chưa vào khay chưa làm gọn.\n4. KH yêu cầu: Qua kiểm tra, hỗ trợ KH","KH (work@namdd.dev) gửi mail phản ánh các vấn đề: \n1.\tTiền dây dẫn thừa: Đề nghị Viettel Phú Thọ thực hiện việc bồi hoàn lại tiền cho phần dây điện thừa do thi công sai lệch ban đầu.\n2.\tTiêu chuẩn vật tư tủ điện (Dựa trên buổi làm việc ngày 11/04/2026): Hai bên đã thống nhất ghi nhận hiện trạng là chưa xác định được vật tư bên trong tủ điện có đảm bảo đúng danh sách thiết bị và tiêu chuẩn kỹ thuật của công ty hay không. Tôi yêu cầu phía Tập đoàn và VCC cung cấp chi tiết danh sách vật tư và tiêu chuẩn kỹ thuật để gia đình có cơ sở so sánh với chiếc tủ trị giá 6.500.000 VNĐ hiện tại. Yêu cầu làm rõ tính an toàn khi sử dụng dây cáp DC để đấu nối cho phần AC và dây DC 6mm2 đi với MCB 63A. Thời hạn phản hồi: Trước ngày 20/04/2026.\n3.\tXử lý lỗi Inverter (SPD DC): Hệ thống liên tục báo lỗi DC SPD. Theo thông tin mới nhất, hiện DatGroup đang làm việc với hãng GoodWe và sẽ có email phản hồi kết quả xử lý trong vòng 02 ngày tới. Đề nghị phía Viettel bám sát để xử lý dứt điểm cho khách hàng .\n4.\tĐiều chỉnh chính sách bảo hành (Dựa trên buổi làm việc ngày 11/04/2026): Thông tin bảo hành combo biến tần và pin lưu trữ của hãng hiện không khớp với hợp đồng . Phía Chi nhánh Phú Thọ đã hẹn xử lý trong vòng 120 ngày kể từ ngày 11/04/2026. Như vậy, thời hạn cuối cùng để hoàn tất việc điều chỉnh này là ngày 09/08/2026.\n6.\tThao tác điều khiển thiết bị từ xa không báo trước: Giải trình về việc tài khoản viettelsolar.phutho@gmail.com tự ý \"Xóa dữ liệu báo động lỗi hồ quang\" và \"Vô hiệu hóa báo động chống sét\" ngày 12/04/2026 mà không thông báo hay nắm rõ mục đích xóa.","- KH chưa báo chi nhánh \n- Tấm pin nlmt cần hỗ trợ 2 cái. Hôm nọ kt lắp sai tấm pin nên bị đọng nước, phần trên thì đúng phần dưới thì sai. Có 2 cái sửa  thì 1 cái dùng được  1 cái không\n- KH cần hỗ trợ sớm","1. KH đã báo cn: a Hoàng Đình Nhâm\n2. KH phản ánh: KH đã báo cn nhiều lần nhưng chưa được hỗ trợ. Hệ của KH 6 cục pin nhưng chỉ thấy xả 3 cục và chỉ xài được 1 lúc là nó <script>
(function () {

  var activeKeys = null;

  function initFilter() {
    if (typeof crosstalk === 'undefined') { setTimeout(initFilter, 150); return; }
    var fh = new crosstalk.FilterHandle(CT_GROUP);
    fh.on('change', function (e) {
      activeKeys = (e.value && e.value.length > 0) ? e.value : null;
    });
  }
  initFilter();

  function getFilteredData() {
    if (!activeKeys) return FULL_DATA;
    var keySet = new Set(activeKeys.map(String));
    return FULL_DATA.filter(function (_, i) {
      return keySet.has(String(i + 1));
    });
  }

  function loadScript(url, cb) {
    if (document.querySelector('script[src="' + url + '"]')) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = cb || function () {};
    s.onerror = function () { alert('Không load được: ' + url); };
    document.head.appendChild(s);
  }

  function setBtnState(btn, loading, label) {
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading ? '⏳ Đang tạo...' : label;
  }

  /* ── EXCEL ── */
  window._taiExcel = function (btn) {
    function doExcel() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '⬇ Tải Excel');
        return;
      }
      var ws = XLSX.utils.json_to_sheet(rows, { header: COL_NAMES });
      ws['!cols'] = COL_NAMES.map(function (col) {
        return { wch: Math.max(Math.round((COL_WIDTHS[col] || 100) / 7), 8) };
      });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sach ticket');
      XLSX.writeFile(wb, 'danh_sach_ticket.xlsx');
      setBtnState(btn, false, '⬇ Tải Excel');
    }
    window.XLSX
      ? doExcel()
      : loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js', doExcel);
  };

  /* ── PNG ── */
  window._taiPNG = function (btn) {
    function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();
</script>

              const html = processXRef(null, note);

        let selectedAnnoteEl;
        const selectorForAnnotation = ( cell, annotation) => {

          let lineAttr = 'data-code-annotation="' +  annotation + '"';
          const selector = 'span[' + cellAttr + '][' + lineAttr + ']';

        const selectCodeLines = (annoteEl) => {
          const doc = window.document;

          const annoteSpan = window.document.querySelector(selectorForAnnotation(targetCell, targetAnnotation));
          const lines = annoteSpan.getAttribute("data-code-lines").split(",");
          const lineIds = lines.map((line) => {

          })
          let top = null;
          let height = null;
          let parent = null;
          if (lineIds.length > 0) {
              //compute the position of the single el (top and bottom and make a div)
              const el = window.document.getElementById(lineIds[0]);
              top = el.offsetTop;
              height = el.offsetHeight;
              parent = el.parentElement.parentElement;
            if (lineIds.length > 1) {
              const lastEl = window.document.getElementById(lineIds[lineIds.length - 1]);
              const bottom = lastEl.offsetTop + lastEl.offsetHeight;
              height = bottom - top;

            if (top !== null && height !== null && parent !== null) {

                parent.appendChild(div);
              }
              div.style.top = top - 2 + "px";
              div.style.height = height + 4 + "px";
              div.style.left = 0;
              let gutterDiv = window.document.getElementById("code-annotation-line-highlight-gutter");
              if (gutterDiv === null) {

              gutterDiv.style.top = top - 2 + "px";
              gutterDiv.style.height = height + 4 + "px";
            }
            selectedAnnoteEl = annoteEl;
          }
        };
        const unselectCodeLines = () => {
          const elementsIds = ["code-annotation-line-highlight", "code-annotation-line-highlight-gutter"];
          elementsIds.forEach((elId) => {
            const div = window.document.getElementById(elId);

          // Handle positioning of the toggle
      window.addEventListener(
        "resize",

        }, 10)
      );
      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
      }
        // Attach click handler to the DT
        const annoteDls = window.document.querySelectorAll('dt[data-target-cell]');
        for (const annoteDlNode of annoteDls) {
