k cọc  chi nhánh báo đang bị thanh tra 2 tuần chưa lắp \nyêu cầu CN HCM goi lại cho KH","Kt chưa liên hệ vệ sinh điều hòa.","kt chưa liên hệ bảo dưỡng điều hòa","1. Đã báo cn: Sự cố từ trước cố người sửa rồi\n2. KH phản ánh: camera vẫn dùng thụ động chỉ xem trực tiếp được, ko xem được các ngày cũ.\n3. KH yêu cầu: Qua hỗ trợ, kiểm tra cho KH, KH sẵn sàng trả phí.","1. KH chưa báo cn\n2. KH phản ánh: Trên app ko có số liệu, thông báo offline, trong khi vẫn kết nối wifi bình thường.\n3. KH yêu cầu: Hỗ trợ, hướng dẫn KH sử dụng sản phẩm","1. KH đã báo cn: a Giang - người phụ trách CN\n2. KH phản ánh: Mới lắp được 1 tháng, và nay là lần đầu mất điện thì ko thấy điện nlmt, trong khi đang nắng và trong app theo dõi là vẫn có 5,6 kw \n3. KH yêu cầu: Qua kiểm tra, khắc phục tình trạng này cho KH","1. KH đã báo cn: a Hưng - tư vấn lắp đặt\n2. KH phản ánh: CN có hứa là cuối tuần này triển khai lắp đặt, nhưng giờ KH đang chưa thấy có lộ trình để lắp đặt gì cả.\n3. KH yêu cầu: Phản hồi lại thông tin cho KH cụ thể lộ trình lắp đặt.","1. KH đã liên hệ CN\n2. KH P/á hệ thống NLMT bị sụt hiệu suất hoàn toàn từ trưa ngày 17, KH đã báo lại CN nhưng chưa có KT qua kiểm tra cho KH, KH nghi ngờ HT có thể bị lỏng dây,\n3. KH cần biết khi nào KT có thể qua KT cho KH để KH có thể sắp xếp thời gian","1. KH đã báo cn\n2. KH phản ánh: KH đã thanh toán số tiền 65tr hơn nửa giá trị HĐ cho a Phạm Ngọc Mạnh mã nv: 190324 rồi hứa hẹn ngày này lắp ngày kia lắp, sau đó KH phát hiện ra là a Mạnh ko chuyển tiền về phía bên CN dẫn đến HĐ của KH triển khai lắp đặt và vật tư chậm. Hiện tại a Mạnh đã bị đình chỉ làm việc ở CN Hà Tĩnh và chuyển tiền lại cho CN Hà Tĩnh. CN có hứa là hôm nay lắp nhưng chẳng thấy đâu và lại phải dời sang 22/4. \n3. KH yêu cầu: KH rất bức xúc yêu cầu TCT làm việc với phía bên CN, thông báo kết quả xử lý khiếu nại cho KH và đẩy nhanh tiến độ vật tư và lắp đặt cho KH.","KH vẫn còn nhu cầu tư vấn NLMT","Kh vẫn còn nhu cầu tư vấn NLMT","Anh Hoàng xã Gia Lâm vẫn có nhu cầu cần được tư vấn về sản phẩm NLMt","Anh quên mật khẩu, hỗ trợ anh cài ứng dụng AIO theo dõi nlmt.","Fb KH hẹn hôm nay không ai liên hệ","Cn báo sự cố hộ khách\nMất 1 trữ điện năng lg mặt trời anh r hưởng hiệu suất\nYêu cầu kt hỗ trợ gấp trong ngày mai","KH đã báo GĐ chi nhanh Nghệ An,\n sự cố sụt giảm hiệu suất, \nyêu cầu Ktv xuống kiểm tra gấp cho KH, KH giục gay gắt","KH đã yêu cầu thanh lý HĐ với giá quá cao từ 8/3 và đã có phản ánh từ 3/4, nhưng đến giờ vẫn chưa nhận được tiền. KH có trao đổi với CN là a Minh nhưng ko nhận được phản hồi. KH yêu cầu TCT hỗ trợ giúp KH nhận lại số tiền, khi nào tài chính đáp ứng đủ KH sẽ chủ động liên hệ.","KH có đơn hàng  nhưng KT chưa liên hệ","1. KH chưa báo cn\n2. KH phản ánh: 1 mái của KH có 2 máy nlmt thì 1 máy đang ko hoạt động.\n3. KH yêu cầu: KT qua kiểm tra hỗ trợ cho KH khắc phục tình trạng này.","KH có đơn hàng nhưng chưa có KT liên hệ hỗ trợ","KH có đơn hàng chưa có KT liên hệ hỗ trợ","KH P/á Bình nóng lạnh sau bảo dưỡng đang bị ngắt điện cần KT đến hỗ trợ kiểm tra","Xuất sai thông tin hóa đơn tên của KHDN. Tên Ngân hàng đúng là Ngân Hàng Tnhh Một Thành Viên Số Vikki - Chi Nhánh Đắk Lắk. KHDN yêu cầu xuất lại hóa đơn, sửa lại giúp tên ngân hàng cho đúng.","Mat app nlmt \nChị đã báo chi nhánh bình dương nv nghỉ rồi\nyêu cầu kt qua giúp chị tải lại app","KH cần liên hệ lại để tư vấn nlmt","CN 0985238555 báo sự cố hộ KH\n1. KH phản ánh: Ắc quy ko chạy khi mất điện, ví dụ như buổi tối tắt nắng hẳn mà ắc quy ko chạy. Mà 100% sử dụng điện lưới\n2. KH yêu cầu: Xử lý gấp cho KH.","1. KH đã báo CN \n2. KH đã báo qua: ntin qua zalo CN Hà Tĩnh \n3. KH phản ánh: Dây từ trên mái tôn xuống chưa vào ống nhựa và đang bị nguồn hở, KH sợ nguy hiểm. Inverter chưa vào khay chưa làm gọn.\n4. KH yêu cầu: Qua kiểm tra, hỗ trợ KH","Đã báo chi nhánh nghệ an nhưng gọi Anh tùng thì không nghe máy\nHợp đồng 23/6 nhg đến bây h ko ai xuống lắp đặt năng lượng mặt trời\nBáo kĩ thuật gọi lại cho khách","CN 0989842999 báo sự cố hộ KH\n1. KH phản ánh: hiệu suất pin giảm, 6 cục mỗi 5kw, 30kw pin mà bình thường chạy tới sáng được mà giờ cứ chạy tới 6.7 tối là sập. Tiêu hao nguồn nhanh.\n2. KH yêu cầu: Qua kiểm tra thiết bị và khắc phục.\n***SĐT liên hệ: 0911290288, Kiều Anh Dũng","KT hẹn t6 với KH là làm nhưng giờ KH liên lạc lại KT, KT bảo ko nhận đơn","Đã báo chi nhánh tây ninh \nHiệu suất thấp năng lượng pin lưu trữ thấp \nKh yêu cầu kt qua xử lý","Sự cố từ TT_1774062706033 trước inverter lỗi, KT đã tháo thiết bị gửi đi cho khách hàng, hãng tiếp nhận xử lý thông thường từ 7-10 ngày, thời gian vận chuyển 2 chiều tầm 4 ngày nên kỹ thuật đã báo khách hàng 14 ngày để xử lý, nên đóng ticker trước.\nKH yêu cầu phản hồi lại thông tin bảo hành thiết bị như thế nào rồi.","KH ký HĐ 3 bên với Stride\n1. KH đã báo cn: a Mạnh\n2. KH phản ánh: điện tổng vẫn còn, pin vẫn còn nhưng tự nhiên nhảy CP bị nhiều lần rồi cứ 5-7s rồi tự có lại nhưng bây giờ thì cúp luôn. Điện lực vào thì vẫn còn, điện xài trong nhà thì ko có. CP tự động nên ko có gì bật ngược lên và KH ko dám bật ngược lên.\n3. KH yêu cầu: Qua kiểm tra, hỗ trợ, khắc phục tình trạng này gấp","1. KH đã báo cn: a Lê Văn Phụng\n2. KH phản ánh: Trước khi tư vấn KH muốn hỏi có thực hiện được thời gian đề ra hay ko để ký HĐ nhưng lúc kí hợp đồng xong chờ 4 ngày chưa có triển khai vật tư thi công. KH có yêu cầu chấm dứt HĐ và CN bảo sẽ thông báo lại với phía bên kinh doanh và sẽ phản hồi lại cho KH. Nhưng đến giờ KH vẫn chưa thấy phản hồi.\n3. KH yêu cầu: Phản hồi lại thông tin về số tiền cọc","- Đã báo qua chi nhánh: A hưng (0869822859)\n- KH phản ánh:Đã kí hd ngày 10/4 mà đến giờ vẫn chưa lắp đặt nlmt\n- Kh yêu cầu: Lắp đặt sớm cho khách","1. KH phản ánh: Đường tín hiệu cáp quang từ đầu ghi ra màn hình hiển thị ở bốt bảo vệ bị lỗi.\n2. KH yêu cầu: nhờ các em bố trí người qua kiểm tra cho anh nhé.","KH (work@namdd.dev) gửi mail phản ánh các vấn đề: \n1.\tTiền dây dẫn thừa: Đề nghị Viettel Phú Thọ thực hiện việc bồi hoàn lại tiền cho phần dây điện thừa do thi công sai lệch ban đầu.\n2.\tTiêu chuẩn vật tư tủ điện (Dựa trên buổi làm việc ngày 11/04/2026): Hai bên đã thống nhất ghi nhận hiện trạng là chưa xác định được vật tư bên trong tủ điện có đảm bảo đúng danh sách thiết bị và tiêu chuẩn kỹ thuật của công ty hay không. Tôi yêu cầu phía Tập đoàn và VCC cung cấp chi tiết danh sách vật tư và tiêu chuẩn kỹ thuật để gia đình có cơ sở so sánh với chiếc tủ trị giá 6.500.000 VNĐ hiện tại. Yêu cầu làm rõ tính an toàn khi sử dụng dây cáp DC để đấu nối cho phần AC và dây DC 6mm2 đi với MCB 63A. Thời hạn phản hồi: Trước ngày 20/04/2026.\n3.\tXử lý lỗi Inverter (SPD DC): Hệ thống liên tục báo lỗi DC SPD. Theo thông tin mới nhất, hiện DatGroup đang làm việc với hãng GoodWe và sẽ có email phản hồi kết quả xử lý trong vòng 02 ngày tới. Đề nghị phía Viettel bám sát để xử lý dứt điểm cho khách hàng .\n4.\tĐiều chỉnh chính sách bảo hành (Dựa trên buổi làm việc ngày 11/04/2026): Thông tin bảo hành combo biến tần và pin lưu trữ của hãng hiện không khớp với hợp đồng . Phía Chi nhánh Phú Thọ đã hẹn xử lý trong vòng 120 ngày kể từ ngày 11/04/2026. Như vậy, thời hạn cuối cùng để hoàn tất việc điều chỉnh này là ngày 09/08/2026.\n6.\tThao tác điều khiển thiết bị từ xa không báo trước: Giải trình về việc tài khoản viettelsolar.phutho@gmail.com tự ý \"Xóa dữ liệu báo động lỗi hồ quang\" và \"Vô hiệu hóa báo động chống sét\" ngày 12/04/2026 mà không thông báo hay nắm rõ mục đích xóa.","-KH đã báo chi nhánh: A Hưng 0869822859\n- Kh phản ánh: Đã kí hợp đồng từ 6/4 mà đến giờ vẫn chưa lắp đặt nlmt \n- KH yều cầu: lắp đặt sớm cho khách","1. KH chưa báo cn\n2. KH phản ánh: Biến tần bị lỗi\n3. KH yêu cầu: Qua kiểm tra thiết bị xem có vấn đề gì không và khắc phục tình trạng này.","1. Đối tác đã báo cn: a Quốc, c Diệu Mai - kinh doanh\n2. Đối tác phản ánh: Có ký HĐ cung cấp, triển khai lắp đặt camera cho KH mà giờ vẫn làm chưa xong, lắp sai vị trí và chưa bàn giao. CN có hứa trước tết là làm xong và lý do là cuối năm là nhiều công việc nên dời sang sau tết nhưng giờ vẫn chưa triển khai bàn giao cho CĐT.\n3. Đối tác yêu cầu: Đốc thúc đội triển khai thi công triển khai lắp đặt nhanh, và bàn giao lại cho CĐT.","- KH chưa báo chi nhánh \n- Tấm pin nlmt cần hỗ trợ 2 cái. Hôm nọ kt lắp sai tấm pin nên bị đọng nước, phần trên thì đúng phần dưới thì sai. Có 2 cái sửa  thì 1 cái dùng được  1 cái không\n- KH cần hỗ trợ sớm","1. KH đã báo cn: a Hoàng Đình Nhâm\n2. KH phản ánh: KH đã báo cn nhiều lần nhưng chưa được hỗ trợ. Hệ của KH 6 cục pin nhưng chỉ thấy xả 3 cục và chỉ xài được 1 lúc là nó hết.\n3. KH yêu cầu: Điều KT qua kiểm tra, khắc phục tình trạng này cho KH.\n***SĐT phản ánh và liên hệ: 0706455040","Kh báo 1 đh bị kêu và không mát","- Chưa báo cho chi nhánh \n- Lắp điện nlmt trên hệ thống hiển thị sai: hệ thống màn hình từ nhà mà nuôi ra điện ngoài, hướng dẫn tải app để theo dõi điện nlmt","- KH báo qua chị Phượng (CN) \n- KH đang gặp sự cố ắc quy, 2 khối ắc quy 1 khối xả 1 khối không\n- Kh yêu cầu xử lý sớm","- Anh báo cho quản lý cho nhân viên xuống không giải quyết đươc nên mới gọi lên tổng đài  \n- Hỗ trợ  kết nối điện nlmt với app để theo dõi thông số. Trước mạng wifi bị hỏng  nên anh phải cài lại\n- Hỗ trợ nhanh giúp anh.","Trong thời gian vừa qua tôi quan sát thấy inverter hybrid có hiện tượng giảm huy động công suất DC từ tấm pin, dù trời vẫn nắng tốt và ổn định, bình lưu trữ vẫn chưa đầy và vẫn phải rút điện từ bình lưu trữ để cấp điện cho phụ tải AC. Mỗi lần hiện tượng này xảy ra kéo dài khoảng 15 - 30 phút vào thời điểm ngẫu nhiên trong ngày.\nVCC hỗ trợ để tìm ra được nguyên nhân và giải pháp cho vấn đề này.","Theo sự cố từ trước TT_1775450344278 \nKH phản ánh và yêu cầu phản hồi về dây dẫn điện từ tấm pin năng lượng vào nguồn cháy mà KH đặt, CN có nói phải đặt hàng và hẹn đến ngày 10 /04 sẽ đến xong rồi không thấy ai trả lời luôn.","1. KH chưa báo CN\n2. KH đang sd NLMT nhưng hiện tại thiết bị ko xả điện\n3. YC KT qua kiểm tra và xử lý gấp\n***địa chỉ lắp đặt: kilo 63, khu đô thị đức tài, xã hoài đức, tỉnh lâm đồng.","CN 0969698499 báo sự cố hộ KH\n1. KH phản ánh: Khi cúp điện, KH đóng điện lại thì bị nhảy ats và tủ điện thì khói bốc lên. CN kiểm tra điện vẫn bình thường.\n2. KH yêu cầu: KT đến kiểm tra thiết bị xem có gặp vấn đề gì không và khắc phục.\n***SĐT liên hệ 0961892898, Lê Hồng Sơn","- Khách báo qua chi nhánh, chi nhánh báo lên tổng đài \n- Hệ thống nlmt bị mất điện, mà không chuyển sang  sử dụng ắc quy","KH gọi từ số 0384349062 báo Inverter không hoạt động\nYV KT qua kiểm tra và xử lý gấp","Sự cố nlmt mới sửa ngày hôm qua, mà hiệu suất lại kém lại , còn đúng 30%. Hôm qua  a tên đức đã sửa , đã báo qua kt. A đã báo qua nhóm không hề có tác dụng gì cả. Anh rất bực mình về cách làm việc ở cskh ở huế","1. KH chưa báo CN\n2. KH phản ánh: Khi mất điện và khi mới có điện thì giật giật mất điện rồi lại có 3,4 lần trong khi pin 80% đầy điện.  Và hiện tượng ko an toàn bởi vì nhà sử dụng thang máy,  mà 3 4 lần như thế rất sợ. Thỉnh thoảng, khi mất điện xảy ra tình trạng này, giật giật mấy phát rồi có lưới pin.\n3. KH yêu cầu: Kiểm tra thiết bị, điện ở trong nhà và khắc phục tình trạng này.","- Mới gọi lên tổng đài \n- Anh đã ký hd. Khi nào có thể lắp đặt nlmt cho anh","Bên em lấy pin nlmt từ ngày 19/3 mà giờ vẫn chưa trả lại. Đã báo chi nhánh mà chưa có pin. Gọi lên tổng đài . Anh muốn xử lý nhanh cho anh","1. KH đã báo cn: Sự cố từ trước KH vẫn thấy hiệu suất kém\n2. KH phản ánh: Trước đấy công suất là 1 ngày 200kw mà sau khi sự cố phản ánh trước đây CN xử lý xong 1 ngày còn có 193-195kw mà vẫn trời nắng to.\n3. KH yêu cầu: Đo đạc lại thiết bị, từng tấm pin nlmt và có biên bản ghi nhận nghiệm thu là hiệu suất còn bao nhiêu kw và đưa ra phương án xử lý là có cần đưa ra hãng bảo hành không.","1. Khách hàng không báo qua chi nhánh \n2. Khách chỉ báo qua hotline \n3. Điện nllmt 2 3 hôm nay hiệu số rất thấp.Giờ cao điểm trước đây thu được 5 6 kí giờ chỉ còn 2 3 kí","Mất 1 string điện không vào ắc quy. Không đủ cung cấp cho tải nhà dùng . Anh cần đến kiêm tra trong ngày hôm nay.\n**Địa chỉ lắp đặt: số nhà 300, kim tân, xã đoài phương, thành phố hà nội.","1. KH đã báo CN: a Nghĩa\n2. KH phản ánh: bị hỏng ắc quy\n3. KH yêu cầu: KT qua kiểm tra hỗ trợ, khắc phục tình trạng này cho KH.\n***SĐT phản ánh và liên hệ: 0964109909","KH dã báo CN\nKH đang sử dụng NLMT, hiện tại KH ko thấy phát sinh điện, bên điện lực báo ko thấy công tơ lên\nYC KT qua kiểm tra và xử lý cho KH","1. KH đã báo CN\n2. KH phản ánh: Ivt bị lỗi ko lên màn hình, ko xả và nạp được\n3. KH yêu cầu: Kiểm tra và khắc phục tình trạng này cho KH\n**Ghi chú: - CN làm sai SĐT trong HĐ: SĐT đúng là 0975020758 \n- SĐT liên hệ và phản ánh: 0962608008 chồng của KH","1. KH chưa báo cn\n2. KH phản ánh: nhà KH có thêm ats của máy nổ, về nguyên tắc máy điện phải chạy nlmt, khi nlmt hết thì chạy máy nổ. Hiện tại thì khi mất điện ko chạy sang nlmt, và khi nlmt hết rồi vẫn ko thấy chạy máy nổ. \n3. KH yêu cầu: Kiểm tra trước nội dung về ats của máy nổ và nlmt. Và khắc phục tình trạng ko sử dụng này của KH.","1. KH đã báo cn\n2. KH yêu cầu: Muốn hiện thông số trên app từ ivt qua điện lưới với điện dùng cho GĐ để báo điện lực.","1. KH đã báo giám đốc chi nhánh nhưng chưa được xử lý dứt điểm\n2. KH phản ánh NLMT bị hỏng không sử dụng được\n3. KH yêu cầu kỹ thuật qua hỗ trợ thay aptomat to hơn","Lỗi pin ko lưu","KH chưa báo CN\nKH yêu cầu NVKT qua lại thiết bị inverter của KH \nSố liên hệ:","KH chưa báo CN\nKH phản ánh: hệ thống bị lỗi, điện bật 10 -15s chớp 1 lần\nKH yêu cầu chuyển KT xuống xử lý gấp","1.Đã báo chi nhánh chưa: chưa báo\n2.Đã báo qua đâu: DTV HPC\n3.KH phản ánh về vấn đề: Hiệu suất hệ thấp.\n4.KH yêu cầu KT qua kiểm tra cho KH","1. KH chưa báo cn\n2. KH phản ánh: Sự cố từ TT_1772587360264 trước sau khi xử lý KH thấy hệ thống nlmt ko có ổn định, lâu lâu tự ngắt và phải bảo nv tắt 3 công tắc cp đi bật lại mãi mới được.\n3. KH yêu cầu: Kiểm tra lại hàng hóa xem có đúng với HĐ về chất lượng, hiệu suất không. Nếu có vấn đề thì thay mới tinh cho KH để hệ thống vận hành trơn tru.","1. KH đã báo cn: a Nguyễn <script>
(function () {

  var activeKeys = null;

  function initFilter() {
    if (typeof crosstalk === 'undefined') { setTimeout(initFilter, 150); return; }
    var fh = new crosstalk.FilterHandle(CT_GROUP);
    fh.on('change', function (e) {
      activeKeys = (e.value && e.value.length > 0) ? e.value : null;
    });
  }
  initFilter();

  function getFilteredData() {
    if (!activeKeys) return FULL_DATA;
    var keySet = new Set(activeKeys.map(String));
    return FULL_DATA.filter(function (_, i) {
      return keySet.has(String(i + 1));
    });
  }

  function loadScript(url, cb) {
    if (document.querySelector('script[src="' + url + '"]')) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = cb || function () {};
    s.onerror = function () { alert('Không load được: ' + url); };
    document.head.appendChild(s);
  }

  function setBtnState(btn, loading, label) {
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading ? '⏳ Đang tạo...' : label;
  }

  /* ── EXCEL ── */
  window._taiExcel = function (btn) {
    function doExcel() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '⬇ Tải Excel');
        return;
      }
      var ws = XLSX.utils.json_to_sheet(rows, { header: COL_NAMES });
      ws['!cols'] = COL_NAMES.map(function (col) {
        return { wch: Math.max(Math.round((COL_WIDTHS[col] || 100) / 7), 8) };
      });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sach ticket');
      XLSX.writeFile(wb, 'danh_sach_ticket.xlsx');
      setBtnState(btn, false, '⬇ Tải Excel');
    }
    window.XLSX
      ? doExcel()
      : loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js', doExcel);
  };

  /* ── PNG ── */
  window._taiPNG = function (btn) {
    function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();
</script>
