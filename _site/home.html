nhân viên xuống không giải quyết đươc nên mới gọi lên tổng đài  \n- Hỗ trợ  kết nối điện nlmt với app để theo dõi thông số. Trước mạng wifi bị hỏng  nên anh phải cài lại\n- Hỗ trợ nhanh giúp anh.","1. KH đã báo cn: KH gọi điện (KH chỉ để là tên là KT viettel, ko lưu tên)\n2. KH phản ánh: Hệ của KH là 8kWp. Năm ngoái sản phẩm vẫn còn là 6kwp/ 1 ngày mà giờ cao nhất chỉ thấy là có 5kwp còn đâu là toàn 4kwp đổ lại.\n3. KH yêu cầu: KT qua kiểm tra lại thiết bị xem hiệu suất thế nào và khắc phục tình trạng này.","1. KH chưa thông tin tới Chi nhánh\n2. KH Phản ánh sau khi s/d hệ thống 2 tháng xuất hiện lỗi nhảy từ điện lưới sang điện NLMT, máy biến tần nóng và hiện chưa nhận được bản Hợp đồng ký tay, \n3.KH cần hỗ trợ đến kiểm tra và hỗ trợ khắc phục, cung cấp chứng từ đây đủ cho KH","Trong thời gian vừa qua tôi quan sát thấy inverter hybrid có hiện tượng giảm huy động công suất DC từ tấm pin, dù trời vẫn nắng tốt và ổn định, bình lưu trữ vẫn chưa đầy và vẫn phải rút điện từ bình lưu trữ để cấp điện cho phụ tải AC. Mỗi lần hiện tượng này xảy ra kéo dài khoảng 15 - 30 phút vào thời điểm ngẫu nhiên trong ngày.\nVCC hỗ trợ để tìm ra được nguyên nhân và giải pháp cho vấn đề này.","- Khách chưa báo chi nhánh\n- Gọi qua hotline \n- Kh phản ánh: pin nlmt bơm không hoạt động\n- Kh yêu cầu xử lý nhanh giúp khách","1. KH báo CN thì bảo thiếu vật tư\n2. KH có HĐ từ 20.3.2026 đến nay vẫn chưa được lắp đặt xong, mới chỉ lắp được tấm PIN NLMT trên mái thôi\n3. YC CN nhanh chóng bổ sung vật tư để hoàn thiện cho KH","1. KH chưa báo Cn\n2. KHđang sử dụng NLMT mấy ngày nay trời nắng nhưng sản lượng cho rất thấp\n3. YC KT qua kiểm tra và khắc phục gấp","Theo sự cố từ trước TT_1775450344278 \nKH phản ánh và yêu cầu phản hồi về dây dẫn điện từ tấm pin năng lượng vào nguồn cháy mà KH đặt, CN có nói phải đặt hàng và hẹn đến ngày 10 /04 sẽ đến xong rồi không thấy ai trả lời luôn.","CN 0985814499 báo sự cố hộ KH\n1. KH phản ánh: Tủ điện khi mất điện đang ko chuyển sang nlmt, giờ đang ko có điện nlmt.\n2. KH yêu cầu: Thay ats chuyển nguồn tự động và cần kiểm tra gấp thiết bị","1. KH chưa báo CN\n2. KH đang sd NLMT nhưng hiện tại thiết bị ko xả điện\n3. YC KT qua kiểm tra và xử lý gấp\n***địa chỉ lắp đặt: kilo 63, khu đô thị đức tài, xã hoài đức, tỉnh lâm đồng.","1. KH đã báo cn: a Huy - bên lắp đặt - đã báo được 2 tháng rồi nhưng chưa thấy hỗ trợ, a Thái - ký HĐ\n2. KH phản ánh: Điều hòa thường xuyên ko thấy có lạnh, lắp ko mở ra được, có hỗ trợ bơm ga 2 lần nhưng giờ vẫn thấy ko có lạnh. KH có thuê KT ngoài đến kiểm tra thì xác định nguyên nhân là do lắp đặt không đảm bảo.\n3. KH yêu cầu: KT đến kiểm tra và khắc phục dứt điểm tình trạng này.","KH báo sau khi được điều hòa  bảo dưỡng  vệ sinh xong thì êm , nhưng chạy lâu vẫn bị kêu , ko biết lỗi do đâu\n YC KT quay lại kiểm tra","1. KH đã báo cn (KH ko nhớ tên)\n2. KH gọi điện\n3. KH phản ánh: Bật công tơ chạy thì hệ thống nlmt tắt\n4. KH yêu cầu: Điều KT cứng qua kiểm tra và xử lý dứt điểm tình trạng này cho KH.","CN 0969698499 báo sự cố hộ KH\n1. KH phản ánh: Khi cúp điện, KH đóng điện lại thì bị nhảy ats và tủ điện thì khói bốc lên. CN kiểm tra điện vẫn bình thường.\n2. KH yêu cầu: KT đến kiểm tra thiết bị xem có gặp vấn đề gì không và khắc phục.\n***SĐT liên hệ 0961892898, Lê Hồng Sơn","- Khách báo qua chi nhánh, chi nhánh báo lên tổng đài \n- Hệ thống nlmt bị mất điện, mà không chuyển sang  sử dụng ắc quy","KH gọi từ số 0384349062 báo Inverter không hoạt động\nYV KT qua kiểm tra và xử lý gấp","Sự cố nlmt mới sửa ngày hôm qua, mà hiệu suất lại kém lại , còn đúng 30%. Hôm qua  a tên đức đã sửa , đã báo qua kt. A đã báo qua nhóm không hề có tác dụng gì cả. Anh rất bực mình về cách làm việc ở cskh ở huế","1. KH chưa báo CN\n2. KH phản ánh: Khi mất điện và khi mới có điện thì giật giật mất điện rồi lại có 3,4 lần trong khi pin 80% đầy điện.  Và hiện tượng ko an toàn bởi vì nhà sử dụng thang máy,  mà 3 4 lần như thế rất sợ. Thỉnh thoảng, khi mất điện xảy ra tình trạng này, giật giật mấy phát rồi có lưới pin.\n3. KH yêu cầu: Kiểm tra thiết bị, điện ở trong nhà và khắc phục tình trạng này.","- Mới gọi lên tổng đài \n- Anh đã ký hd. Khi nào có thể lắp đặt nlmt cho anh","1. KH chưa báo cn\n2. KH phản ánh: ivt ko hoạt động, đang xài thì bị cúp chạy xuống thì ivt bị tắt.\n3. KH yêu cầu: điều KT qua kiểm tra khắc phục tình trạng này cho KH.","Bên em lấy pin nlmt từ ngày 19/3 mà giờ vẫn chưa trả lại. Đã báo chi nhánh mà chưa có pin. Gọi lên tổng đài . Anh muốn xử lý nhanh cho anh","1 năm đầu tiên có vệ sinh. Những năm sau không có  gói vệ sinh định kỳ, đã tháo tấm pin không trả lại. Hứa tặng bên chị 2 camera . Đã gọi cho bạn Nguyễn Sinh Dũng, giám đốc không nghe máy, hứa sẽ đẩy việc đến hỗ trợ. Chị không thấy ai hỗ trợ lại.   Chị cần hỗ trợ sớm trong vòng 5 ngày","1. KH đã báo cn: Sự cố từ trước KH vẫn thấy hiệu suất kém\n2. KH phản ánh: Trước đấy công suất là 1 ngày 200kw mà sau khi sự cố phản ánh trước đây CN xử lý xong 1 ngày còn có 193-195kw mà vẫn trời nắng to.\n3. KH yêu cầu: Đo đạc lại thiết bị, từng tấm pin nlmt và có biên bản ghi nhận nghiệm thu là hiệu suất còn bao nhiêu kw và đưa ra phương án xử lý là có cần đưa ra hãng bảo hành không.","1. KH đã báo cn: a trường, a chạm, a Trung\n2. KH phản ánh: hàng chưa về, cn có hẹn m4 là bàn giao toàn bộ linh kiện để lắp đặt nhưng CN có phản hồi lý do là hàng từ hà nội chưa về được. KH đã thanh toán số tiền trong HĐ.\n3. KH yêu cầu: Phản hồi và tình trạng linh kiện đang di chuyển đến đâu rồi và chậm nhất là đến m10 phải có linh kiện, vật tư ở đây nếu ko KH sẽ chấm dứt HĐ.","Mất 1 string điện không vào ắc quy. Không đủ cung cấp cho tải nhà dùng . Anh cần đến kiêm tra trong ngày hôm nay.\n**Địa chỉ lắp đặt: số nhà 300, kim tân, xã đoài phương, thành phố hà nội.","1. KH chưa báo cn\n2. KH phản ánh: hệ thống nlmt ở trạng thái báo động, ko ghi nhận dữ liệu, ko thấy số đầu ra.\n3. KH yêu cầu: KT qua kiểm tra thiết bị, khắc phục tình trạng này.","1. KH đã báo CN: a Nghĩa\n2. KH phản ánh: bị hỏng ắc quy\n3. KH yêu cầu: KT qua kiểm tra hỗ trợ, khắc phục tình trạng này cho KH.\n***SĐT phản ánh và liên hệ: 0964109909","Sản phẩm KH được tặng, KH nội bộ viettel. Người phản ánh báo hộ 0966337575 \n1. KH phản ánh: Bếp từ đang bị lỗi không sử dụng được\n2. KH yêu cầu: Bảo hành bếp từ này cho KH\n***SĐT phản ánh: 0966337575 và zalo Đình Đại","1. KH đã báo cn: a Hà Hữu Giang\n2. KH phản ánh: Sự cố hiệu suất từ trước KT đã đến kiểm tra và trao đổi với KH đưa ra kết luận là do bên Kinh Doanh tư vấn lắp đặt sai nên tấm pin bị che khuất, che phủ nên ko đạt hiệu suất. Từ đầu lúc ký HĐ, KH đã trao đổi với a Tín là nên lắp hướng nào, hay nắng hướng nào và vị trí này tối đa hiệu suất là bnhieu. Hệ của KH là 36kw, bên kinh  doanh có cam kết là trung bình 1 ngày 100 số, và 6 tháng đầu sử dụng là từ 2900-3100 số mà giờ chỉ được 60-70 số 1 ngày, sản lượng ko đạt.\n3. KH yêu cầu: Có trách nhiệm cam kết đúng giữa KH và bên Kinh doanh, và thực hiện đưa ra phương án xử lý để có sản lượng theo đúng cam kết. KH yêu cầu xử lý gấp.","KH dã báo CN\nKH đang sử dụng NLMT, hiện tại KH ko thấy phát sinh điện, bên điện lực báo ko thấy công tơ lên\nYC KT qua kiểm tra và xử lý cho KH","1. KH đã báo cn: CN qua kiểm tra qua loa, đổ thừa này nọ\n2. KH phản ánh: Hệ của KH 10kw cũng chỉ thấy chạy được 5,6 kw điện. KH có lắp thêm 5 tấm nữa chạy cho mạnh cũng chỉ lên được 7 kw mà nắng gắt 35 độ. KH ktra thấy biến tần chạy khoảng 60%.\n3. KH yêu cầu: Qua kiểm tra tình trạng nguyên nhân để tăng hiệu suất đúng với hệ của KH.","1. KH đã báo CN\n2. KH phản ánh: Ivt bị lỗi ko lên màn hình, ko xả và nạp được\n3. KH yêu cầu: Kiểm tra và khắc phục tình trạng này cho KH\n**Ghi chú: - CN làm sai SĐT trong HĐ: SĐT đúng là 0975020758 \n- SĐT liên hệ và phản ánh: 0962608008 chồng của KH","1. KH chưa báo cn\n2. KH phản ánh: nhà KH có thêm ats của máy nổ, về nguyên tắc máy điện phải chạy nlmt, khi nlmt hết thì chạy máy nổ. Hiện tại thì khi mất điện ko chạy sang nlmt, và khi nlmt hết rồi vẫn ko thấy chạy máy nổ. \n3. KH yêu cầu: Kiểm tra trước nội dung về at <script>
(function () {

  var activeKeys = null;

  function initFilter() {
    if (typeof crosstalk === 'undefined') { setTimeout(initFilter, 150); return; }
    var fh = new crosstalk.FilterHandle(CT_GROUP);
    fh.on('change', function (e) {
      activeKeys = (e.value && e.value.length > 0) ? e.value : null;
    });
  }
  initFilter();

  function getFilteredData() {
    if (!activeKeys) return FULL_DATA;
    var keySet = new Set(activeKeys.map(String));
    return FULL_DATA.filter(function (_, i) {
      return keySet.has(String(i + 1));
    });
  }

  function loadScript(url, cb) {
    if (document.querySelector('script[src="' + url + '"]')) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = cb || function () {};
    s.onerror = function () { alert('Không load được: ' + url); };
    document.head.appendChild(s);
  }

  function setBtnState(btn, loading, label) {
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading ? '⏳ Đang tạo...' : label;
  }

  /* ── EXCEL ── */
  window._taiExcel = function (btn) {
    function doExcel() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '⬇ Tải Excel');
        return;
      }
      var ws = XLSX.utils.json_to_sheet(rows, { header: COL_NAMES });
      ws['!cols'] = COL_NAMES.map(function (col) {
        return { wch: Math.max(Math.round((COL_WIDTHS[col] || 100) / 7), 8) };
      });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sach ticket');
      XLSX.writeFile(wb, 'danh_sach_ticket.xlsx');
      setBtnState(btn, false, '⬇ Tải Excel');
    }
    window.XLSX
      ? doExcel()
      : loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js', doExcel);
  };

  /* ── PNG ── */
  window._taiPNG = function (btn) {
    function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();

            const activeEl = window.document.querySelector('dt[data-target-cell].code-annotation-active');
            if (activeEl) {
              activeEl.classList.remove('code-annotation-active');
            }
            selectCodeLines(clickedEl);
            clickedEl.classList.add('code-annotation-active');
          } else {
            // Unselect the line
            unselectCodeLines();
            clickedEl.classList.remove('code-annotation-active');
          }
        });
      }
  const findCites = (el) => {
    const parentEl = el.parentElement;
    if (parentEl) {
      const cites = parentEl.dataset.cites;
      if (cites) {
        return {
          el,
          cites: cites.split(' ')
        };
      } else {
        return findCites(el.parentElement)
      }
    } else {
      return undefined;
    }
  };
  var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
  for (var i=0; i<bibliorefs.length; i++) {
    const ref = bibliorefs[i];
    const citeInfo = findCites(ref);
    if (citeInfo) {
      tippyHover(citeInfo.el, function() {
        var popup = window.document.createElement('div');
        citeInfo.cites.forEach(function(cite) {
          var citeDiv = window.document.createElement('div');
          citeDiv.classList.add('hanging-indent');
          citeDiv.classList.add('csl-entry');
          var biblioDiv = window.document.getElementById('ref-' + cite);
          if (biblioDiv) {
            citeDiv.innerHTML = biblioDiv.innerHTML;
          }
          popup.appendChild(citeDiv);
        });
        return popup.innerHTML;
      });
    }
  }
});

<script>
  const CHECK_INTERVAL = 60000;
  
  async function getLastBuild() {
    const res = await fetch('/last-build.json?t=' + Date.now());
    const data = await res.json();
    return data.buildTime;
  }
  (async () => {
    const initialBuild = await getLastBuild();
    
    setInterval(async () => {
      const currentBuild = await getLastBuild();
      if (currentBuild !== initialBuild) {
        window.location.reload();
      }
    }, CHECK_INTERVAL);
  })();
</script>
